// App state
let currentQ = 0;
let answers = {};

const clickAudio = new Audio('quiz-click.wav');
clickAudio.volume = 0.45;
function renderQuestion() {
  const q = questions[currentQ];
const pct = Math.round((currentQ / questions.length) * 100);  
document.getElementById("progressLabel").textContent = `Adventure Match Progress`;
  document.getElementById("progressPct").textContent = pct + "%";
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("backBtn").disabled = currentQ === 0;
  document.getElementById("nextBtn").disabled = !answers[q.id];

  const area = document.getElementById("questionArea");
  area.innerHTML = `
    <div class="question-number">Question ${currentQ + 1} of ${questions.length}</div>
    <div class="question-text">${q.text}</div>
    <div class="options-grid">
      ${q.options.map(opt => `
        <button class="option-btn ${answers[q.id] === opt.value ? 'selected' : ''}"
          onclick="selectOption('${q.id}', '${opt.value}', this)">
          <span class="option-emoji">${opt.emoji}</span>
          <span class="option-label">${opt.label}</span>
          <span class="option-desc">${opt.desc}</span>
        </button>
      `).join('')}
    </div>
  `;
}

function selectOption(qId, value, btn) {

  clickAudio.currentTime = 0;
  clickAudio.play().catch(() => {});

  answers[qId] = value;

  document
    .querySelectorAll('.option-btn')
    .forEach(b => b.classList.remove('selected'));

  btn.classList.add('selected');

  document.getElementById("nextBtn").disabled = false;
}

function goNext() {
  if (!answers[questions[currentQ].id]) return;
  currentQ++;
  if (currentQ >= questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function goBack() {
  if (currentQ > 0) {
    currentQ--;
    renderQuestion();
  }
}

function showResult() {
  const result = getResult(answers);
console.log("Quiz Result:", result.title);
console.log("Answers:", answers);
  const audio = new Audio('quiz-finish.wav');
  audio.play().catch(() => {});

  document.getElementById("progressWrap").style.display = "none";

  document.getElementById("quizBody").innerHTML = `
    <div class="result-wrap">

      <span class="result-badge">✦ Your Adventure Match ✦</span>

      <h2 class="result-title">${result.title}</h2>

      <p class="result-tagline">${result.tagline}</p>

      <p class="result-why">${result.why}</p>

      <div class="result-card">

        <h3>⚔ Recommended for You</h3>

        <a href="${result.primary.url}" class="product-link" target="_blank">
          <div class="product-rec featured-product">
            <span class="product-emoji">${result.primary.emoji}</span>

            <div class="product-info">
              <div class="product-name">${result.primary.name}</div>
              <div class="product-desc">${result.primary.desc}</div>
              <div class="product-price">${result.primary.price}</div>
            </div>
          </div>
        </a>

        <a href="${result.secondary.url}" class="product-link" target="_blank">
          <div class="product-rec">
            <span class="product-emoji">${result.secondary.emoji}</span>

            <div class="product-info">
              <div class="product-name">${result.secondary.name}</div>
              <div class="product-desc">${result.secondary.desc}</div>
              <div class="product-price">${result.secondary.price}</div>
            </div>
          </div>
        </a>

        ${result.bonus ? `
        <a href="${result.bonus.url}" class="product-link" target="_blank">
          <div class="product-rec">
            <span class="product-emoji">${result.bonus.emoji}</span>

            <div class="product-info">
              <div class="product-name">${result.bonus.name}</div>
              <div class="product-desc">${result.bonus.desc}</div>
              <div class="product-price">${result.bonus.price}</div>
            </div>
          </div>
        </a>
        ` : ''}

      </div>
      <div class="trust-badge">
  ⚔ Trusted by 446+ families who backed The Enchanted Forest on Kickstarter
</div>
      <div class="cta-wrap">

        <a href="${result.primary.url}"
           class="cta-primary"
           target="_blank">
           🗡️ Get ${result.primary.name} →
        </a>

        <a href="https://www.cavalieradventures.com.au/shop"
           class="cta-secondary"
           target="_blank">
           Browse All Adventures
        </a>

        <button class="restart-btn"
                onclick="restartQuiz()">
          ↩ Retake the quiz
        </button>

      </div>

    </div>
  `;
}

function restartQuiz() {
  currentQ = 0;
  answers = {};
  document.getElementById("progressWrap").style.display = "block";
  document.getElementById("quizBody").innerHTML = `
    <div class="question-area" id="questionArea"></div>
    <div class="nav-wrap">
      <button class="nav-back" id="backBtn" onclick="goBack()">← Back</button>
      <button class="nav-next" id="nextBtn" onclick="goNext()" disabled>Continue →</button>
    </div>
  `;
  renderQuestion();
}

// Init
renderQuestion();
</script>
